<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IT Audit 진행 현황 | 삼일PwC</title>
  <style>
    :root {
      --red: #E31837;
      --red-dk: #B01229;
      --red-lt: #FBEAED;
      --white: #FFFFFF;
      --off: #F7F7F7;
      --lt: #F0F0F0;
      --mid: #D0D0D0;
      --gray: #767676;
      --dark: #2D2D2D;
      --text: #333333;
      --green: #00843D;
      --green-lt: #E6F4EE;
      --orange: #E65100;
      --orange-lt: #FFF3E0;
      --blue: #0070C0;
      --blue-lt: #E3F2FD;
      --purple: #6A1B9A;
      --purple-lt: #F3E5F5;
      --shadow: 0 1px 4px rgba(0,0,0,0.1);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.15);
      --r: 3px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Malgun Gothic', '맑은 고딕', sans-serif; background: var(--off); color: var(--text); font-size: 13px; line-height: 1.5; }

    /* ── Header ── */
    .hdr { background: var(--red); color: #fff; padding: 0 24px; height: 54px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 200; box-shadow: 0 2px 6px rgba(0,0,0,0.25); }
    .hdr-brand { display: flex; align-items: center; gap: 12px; }
    .pwc-logo { font-size: 21px; font-weight: 800; letter-spacing: -0.5px; }
    .hdr-sep { width: 1px; height: 24px; background: rgba(255,255,255,0.35); }
    .hdr-title { font-size: 13px; font-weight: 400; opacity: .9; }
    .hdr-right { font-size: 11px; opacity: .8; text-align: right; line-height: 1.4; }

    /* ── Tab Nav ── */
    .tab-nav { background: #fff; border-bottom: 1px solid var(--mid); padding: 0 24px; display: flex; align-items: center; gap: 2px; position: sticky; top: 54px; z-index: 190; }
    .tab-nav button { padding: 13px 18px; border: none; background: none; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--gray); border-bottom: 3px solid transparent; transition: all .15s; white-space: nowrap; }
    .tab-nav button:hover { color: var(--red); }
    .tab-nav button.active { color: var(--red); border-bottom-color: var(--red); font-weight: 700; }

    /* ── Layout ── */
    .main { padding: 22px 24px; max-width: 1680px; margin: 0 auto; }
    .tab-pane { display: none; } .tab-pane.active { display: block; }

    /* ── Cards ── */
    .card { background: #fff; border-radius: var(--r); box-shadow: var(--shadow); padding: 18px 20px; margin-bottom: 18px; }
    .card-hd { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 2px solid var(--red); }
    .card-hd h3 { font-size: 14px; font-weight: 700; color: var(--dark); }
    .card-hd .card-actions { display: flex; gap: 8px; align-items: center; }

    /* ── KPI Grid ── */
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 18px; }
    .kpi { background: #fff; border-radius: var(--r); padding: 14px 18px; box-shadow: var(--shadow); border-left: 4px solid var(--red); }
    .kpi.green { border-left-color: var(--green); }
    .kpi.orange { border-left-color: var(--orange); }
    .kpi.blue { border-left-color: var(--blue); }
    .kpi.purple { border-left-color: var(--purple); }
    .kpi-lbl { font-size: 10px; text-transform: uppercase; letter-spacing: .6px; color: var(--gray); margin-bottom: 6px; font-weight: 600; }
    .kpi-val { font-size: 30px; font-weight: 800; color: var(--dark); line-height: 1; }
    .kpi-sub { font-size: 11px; color: var(--gray); margin-top: 5px; }

    /* ── Domain Grid ── */
    .domain-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; margin-bottom: 18px; }
    .dom-card { background: #fff; border-radius: var(--r); padding: 18px; box-shadow: var(--shadow); }
    .dom-tag { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; margin-bottom: 8px; }
    .tag-apd { background: var(--blue-lt); color: var(--blue); }
    .tag-pc  { background: var(--green-lt); color: var(--green); }
    .tag-co  { background: var(--orange-lt); color: var(--orange); }
    .tag-pd  { background: var(--purple-lt); color: var(--purple); }
    .tag-itac { background: #FFF9C4; color: #F57F17; }
    .dom-name { font-weight: 700; font-size: 13px; margin-bottom: 2px; }
    .dom-sub { font-size: 11px; color: var(--gray); margin-bottom: 10px; }
    .dom-stat { display: flex; justify-content: space-between; font-size: 11px; color: var(--gray); margin-bottom: 4px; }
    .pb { height: 6px; background: var(--lt); border-radius: 3px; overflow: hidden; }
    .pb-fill { height: 100%; border-radius: 3px; transition: width .4s ease; }
    .fill-green { background: var(--green); }
    .fill-orange { background: var(--orange); }
    .fill-red { background: var(--red); }
    .fill-blue { background: var(--blue); }

    /* ── Staff Grid ── */
    .staff-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px,1fr)); gap: 14px; }
    .staff-card { background: #fff; border-radius: var(--r); padding: 16px; box-shadow: var(--shadow); }
    .staff-av { width: 38px; height: 38px; border-radius: 50%; background: var(--red); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 13px; margin-bottom: 10px; }
    .staff-name { font-weight: 700; font-size: 14px; }
    .staff-role { font-size: 11px; color: var(--gray); margin-bottom: 10px; }
    .staff-dom { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 8px; }
    .staff-tag { padding: 2px 7px; border-radius: 10px; font-size: 10px; font-weight: 600; }

    /* ── Tables ── */
    .tbl-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 900px; }
    thead th { background: #F5F5F5; padding: 9px 11px; text-align: left; font-weight: 700; color: var(--dark); border-bottom: 2px solid var(--mid); white-space: nowrap; font-size: 11px; text-transform: uppercase; letter-spacing: .4px; }
    tbody td { padding: 9px 11px; border-bottom: 1px solid #F0F0F0; vertical-align: middle; }
    tbody tr:hover td { background: #FAFAFA; }
    tbody tr.row-sel td { background: var(--red-lt); }

    /* ── Domain filter tabs ── */
    .dom-tabs { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
    .dom-tab { padding: 5px 14px; border: 1px solid var(--mid); background: #fff; border-radius: 20px; cursor: pointer; font-size: 12px; font-weight: 500; color: var(--gray); transition: all .15s; }
    .dom-tab:hover { border-color: var(--red); color: var(--red); }
    .dom-tab.active { background: var(--red); color: #fff; border-color: var(--red); }

    /* ── Status badges ── */
    .sb { display: inline-block; padding: 2px 9px; border-radius: 10px; font-size: 11px; font-weight: 600; white-space: nowrap; }
    .sb-ns  { background: #EEEEEE; color: #616161; }
    .sb-ip  { background: var(--blue-lt); color: var(--blue); }
    .sb-rv  { background: var(--orange-lt); color: var(--orange); }
    .sb-ok  { background: var(--green-lt); color: var(--green); }
    .sb-ex  { background: #FFEBEE; color: #C62828; }

    /* Sub-status dot */
    .sdot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }
    .sdot-ns { background: #BDBDBD; } .sdot-ip { background: var(--blue); } .sdot-ok { background: var(--green); }
    .sdot-ex { background: var(--red); }

    /* Auto badge */
    .ab { display: inline-block; padding: 2px 7px; border-radius: 3px; font-size: 10px; font-weight: 700; }
    .ab-y { background: var(--green-lt); color: var(--green); }
    .ab-n { background: #F5F5F5; color: #757575; }
    .ab-s { background: var(--orange-lt); color: var(--orange); }

    /* Inline progress */
    .ipb { display: flex; align-items: center; gap: 7px; }
    .ipb-bar { flex: 1; height: 5px; background: var(--lt); border-radius: 3px; overflow: hidden; min-width: 50px; }
    .ipb-fill { height: 100%; border-radius: 3px; }
    .pct { font-size: 11px; font-weight: 700; color: var(--gray); min-width: 32px; text-align: right; }

    /* Buttons */
    .btn { padding: 6px 14px; border-radius: var(--r); border: none; cursor: pointer; font-size: 12px; font-weight: 600; transition: all .15s; }
    .btn-r { background: var(--red); color: #fff; } .btn-r:hover { background: var(--red-dk); }
    .btn-o { background: #fff; color: var(--red); border: 1px solid var(--red); } .btn-o:hover { background: var(--red); color: #fff; }
    .btn-g { background: #fff; color: var(--gray); border: 1px solid var(--mid); } .btn-g:hover { background: var(--lt); }
    .btn-sm { padding: 4px 10px; font-size: 11px; }
    .btn-icon { padding: 4px 8px; font-size: 14px; }

    /* Modal */
    .mo { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 1000; align-items: center; justify-content: center; }
    .mo.open { display: flex; }
    .mo-box { background: #fff; border-radius: var(--r); padding: 24px; width: 90%; max-width: 520px; box-shadow: var(--shadow-md); max-height: 90vh; overflow-y: auto; }
    .mo-hd { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; padding-bottom: 10px; border-bottom: 2px solid var(--red); }
    .mo-hd h3 { font-size: 15px; font-weight: 700; }
    .mo-close { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--gray); line-height: 1; }
    .mo-ft { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; padding-top: 14px; border-top: 1px solid var(--lt); }

    /* Form */
    .fg { margin-bottom: 14px; }
    .fl { display: block; font-size: 12px; font-weight: 600; color: var(--dark); margin-bottom: 5px; }
    .fi { width: 100%; padding: 7px 11px; border: 1px solid var(--mid); border-radius: var(--r); font-size: 13px; transition: border-color .15s; }
    .fi:focus { outline: none; border-color: var(--red); }
    select.fi { background: #fff; cursor: pointer; }
    textarea.fi { resize: vertical; min-height: 70px; }

    /* Detail rows */
    .dl { display: flex; gap: 8px; margin-bottom: 8px; }
    .dt { font-size: 12px; color: var(--gray); font-weight: 500; min-width: 130px; flex-shrink: 0; }
    .dd { font-size: 12px; }
    .section-lbl { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--gray); margin: 14px 0 8px; }

    /* Exception icon */
    .exc { color: var(--red); font-weight: 700; }
    .no-exc { color: #BDBDBD; }

    /* Column delete btn in header */
    .col-del { background: none; border: none; color: #CCCCCC; cursor: pointer; padding: 0 3px; font-size: 12px; line-height: 1; vertical-align: middle; }
    .col-del:hover { color: var(--red); }

    /* Editable cell */
    .ec { cursor: text; min-width: 90px; }
    .ec input, .ec-in { width: 100%; border: 1px solid var(--mid); padding: 3px 6px; border-radius: 3px; font-size: 12px; font-family: inherit; }
    .ec input:focus { outline: none; border-color: var(--red); }

    /* Status select inline */
    .st-sel { border: 1px solid var(--mid); border-radius: 10px; padding: 2px 6px; font-size: 11px; font-weight: 600; background: #fff; cursor: pointer; }

    /* Substatus cells */
    .ssc { display: flex; align-items: center; gap: 5px; }
    .ssc select { border: none; background: none; font-size: 11px; cursor: pointer; padding: 0; color: var(--text); }

    /* Info bar */
    .ib { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
    .ib-l { display: flex; align-items: center; gap: 10px; }
    .cnt { font-size: 12px; color: var(--gray); }

    /* Legend */
    .legend { display: flex; gap: 14px; flex-wrap: wrap; }
    .leg-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--gray); }

    /* Summary table in detail */
    .smry { width: 100%; font-size: 12px; border-collapse: collapse; margin-top: 6px; }
    .smry td { padding: 5px 8px; border: 1px solid var(--lt); }
    .smry tr:nth-child(even) td { background: var(--off); }

    @media (max-width: 900px) {
      .domain-grid { grid-template-columns: repeat(2,1fr); }
      .kpi-grid { grid-template-columns: repeat(2,1fr); }
      .main { padding: 12px 14px; }
      .hdr { padding: 0 14px; }
    }
  </style>
</head>
<body>

<!-- ── Header ── -->
<header class="hdr">
  <div class="hdr-brand">
    <div class="pwc-logo">PwC</div>
    <div class="hdr-sep"></div>
    <div class="hdr-title">IT Audit 진행 현황 관리</div>
  </div>
  <div class="hdr-right">
    <div>삼일PwC · IT Audit Team</div>
    <div id="hdr-date"></div>
  </div>
</header>

<!-- ── Tab Navigation ── -->
<nav class="tab-nav">
  <button class="active" onclick="switchTab('dashboard', this)">📊 대시보드</button>
  <button onclick="switchTab('itgc', this)">🔒 ITGC</button>
  <button onclick="switchTab('itac', this)">⚙️ ITAC</button>
</nav>

<main class="main">

  <!-- ══════════ DASHBOARD ══════════ -->
  <div id="pane-dashboard" class="tab-pane active">
    <!-- KPI -->
    <div class="kpi-grid" id="kpi-area"></div>

    <!-- Domain Progress + Staff -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px;">

      <div class="card">
        <div class="card-hd"><h3>ITGC 도메인별 진행률</h3></div>
        <div id="domain-prog"></div>
      </div>

      <div class="card">
        <div class="card-hd"><h3>ITAC 진행 현황</h3></div>
        <div id="itac-prog"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-hd"><h3>담당자별 현황</h3></div>
      <div class="staff-grid" id="staff-area"></div>
    </div>

    <!-- Status legend -->
    <div class="card" style="padding:14px 20px;">
      <div class="legend">
        <div class="leg-item"><span class="sb sb-ns">미착수</span> 시작 전</div>
        <div class="leg-item"><span class="sb sb-ip">진행중</span> 테스트 수행 중</div>
        <div class="leg-item"><span class="sb sb-rv">검토중</span> Manager 검토 대기</div>
        <div class="leg-item"><span class="sb sb-ok">완료</span> Sign-off 완료</div>
        <div class="leg-item"><span class="sb sb-ex">이슈있음</span> 예외사항 발견</div>
      </div>
    </div>
  </div>

  <!-- ══════════ ITGC ══════════ -->
  <div id="pane-itgc" class="tab-pane">
    <div class="domain-grid" id="dom-summary"></div>

    <div class="card">
      <div class="card-hd">
        <h3>ITGC 통제 현황</h3>
        <div class="card-actions">
          <span id="itgc-cnt" class="cnt"></span>
          <button class="btn btn-o btn-sm" onclick="openAddCol('itgc')">＋ 열 추가</button>
        </div>
      </div>

      <!-- Domain filter -->
      <div class="dom-tabs" id="dom-filter">
        <button class="dom-tab active" onclick="filterDomain('ALL',this)">전체</button>
        <button class="dom-tab" onclick="filterDomain('APD',this)">APD <span style="color:var(--blue)">·</span> 변경관리</button>
        <button class="dom-tab" onclick="filterDomain('PC',this)">PC <span style="color:var(--green)">·</span> 접근통제</button>
        <button class="dom-tab" onclick="filterDomain('CO',this)">CO <span style="color:var(--orange)">·</span> 운영통제</button>
        <button class="dom-tab" onclick="filterDomain('PD',this)">PD <span style="color:var(--purple)">·</span> 문제관리</button>
      </div>

      <div class="tbl-wrap">
        <table id="itgc-tbl">
          <thead id="itgc-thead"></thead>
          <tbody id="itgc-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- ══════════ ITAC ══════════ -->
  <div id="pane-itac" class="tab-pane">
    <div class="card">
      <div class="card-hd">
        <h3>ITAC 응용 통제 현황</h3>
        <div class="card-actions">
          <span id="itac-cnt" class="cnt"></span>
          <button class="btn btn-o btn-sm" onclick="openAddCol('itac')">＋ 열 추가</button>
        </div>
      </div>

      <div class="dom-tabs" id="itac-proc-filter">
        <button class="dom-tab active" onclick="filterProc('ALL',this)">전체</button>
        <button class="dom-tab" onclick="filterProc('수익',this)">수익 (Revenue)</button>
        <button class="dom-tab" onclick="filterProc('구매',this)">구매/지출</button>
        <button class="dom-tab" onclick="filterProc('급여',this)">급여</button>
        <button class="dom-tab" onclick="filterProc('재고',this)">재고/자산</button>
        <button class="dom-tab" onclick="filterProc('재무',this)">재무마감</button>
      </div>

      <div class="tbl-wrap">
        <table id="itac-tbl">
          <thead id="itac-thead"></thead>
          <tbody id="itac-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

</main>

<!-- ── Modal: Add Column ── -->
<div class="mo" id="mo-addcol">
  <div class="mo-box">
    <div class="mo-hd">
      <h3>추가 검토 열 추가</h3>
      <button class="mo-close" onclick="closeModal('mo-addcol')">✕</button>
    </div>
    <div class="fg">
      <label class="fl">열 이름 (추가 검토 항목명)</label>
      <input class="fi" id="addcol-name" type="text" placeholder="예: 추가증빙 요청, 전문가 의견, 이슈 내용 등">
    </div>
    <div class="fg">
      <label class="fl">입력 형식</label>
      <select class="fi" id="addcol-type">
        <option value="text">텍스트 자유 입력</option>
        <option value="status">상태 선택 (Y/N/N/A)</option>
        <option value="date">날짜</option>
      </select>
    </div>
    <div class="mo-ft">
      <button class="btn btn-g" onclick="closeModal('mo-addcol')">취소</button>
      <button class="btn btn-r" onclick="confirmAddCol()">추가</button>
    </div>
  </div>
</div>

<!-- ── Modal: Control Detail ── -->
<div class="mo" id="mo-detail">
  <div class="mo-box" style="max-width:640px;">
    <div class="mo-hd">
      <h3 id="det-title">통제 상세</h3>
      <button class="mo-close" onclick="closeModal('mo-detail')">✕</button>
    </div>
    <div id="det-body"></div>
    <div class="mo-ft">
      <button class="btn btn-g" onclick="closeModal('mo-detail')">닫기</button>
      <button class="btn btn-r" id="det-save-btn">저장</button>
    </div>
  </div>
</div>

<script>
'use strict';

// ══════════════════════════════════════════════════
// DATA
// ══════════════════════════════════════════════════

const STAFF = [

let itgcData, itacData, itgcCols, itacCols;
let curDomain = 'ALL';
let curProc   = 'ALL';
let addColTarget = '';

function loadState() {
  try {
    itgcData = JSON.parse(localStorage.getItem('itgc_data')) || deepClone(DEFAULT_ITGC);
    itacData = JSON.parse(localStorage.getItem('itac_data')) || deepClone(DEFAULT_ITAC);
    itgcCols = JSON.parse(localStorage.getItem('itgc_cols')) || [];
    itacCols = JSON.parse(localStorage.getItem('itac_cols')) || [];
    // migrate extra data
    itgcData.forEach(r => { if(!r.extra) r.extra = {}; });
    itacData.forEach(r => { if(!r.extra) r.extra = {}; });
  } catch(e) {
    itgcData = deepClone(DEFAULT_ITGC);
    itacData = deepClone(DEFAULT_ITAC);
    itgcCols = []; itacCols = [];
  }
}

function saveState() {
  localStorage.setItem('itgc_data', JSON.stringify(itgcData));
  localStorage.setItem('itac_data', JSON.stringify(itacData));
  localStorage.setItem('itgc_cols', JSON.stringify(itgcCols));
  localStorage.setItem('itac_cols', JSON.stringify(itacCols));
}

function deepClone(o) { return JSON.parse(JSON.stringify(o)); }

// HELPERS
// ══════════════════════════════════════════════════
const STATUS_MAP = {
  'not-started': { cls:'sb-ns', label:'미착수' },
  'in-progress' : { cls:'sb-ip', label:'진행중' },
  'under-review': { cls:'sb-rv', label:'검토중' },
  'completed'   : { cls:'sb-ok', label:'완료' },
  'issue'       : { cls:'sb-ex', label:'이슈있음' },
};
const SUB_MAP = {
  'not-started':{ dot:'sdot-ns', label:'미착수' },
  'in-progress':{ dot:'sdot-ip', label:'진행중' },
  'completed'  :{ dot:'sdot-ok', label:'완료' },
};
function statusBadge(s){ const m=STATUS_MAP[s]||STATUS_MAP['not-started']; return `<span class="sb ${m.cls}">${m.label}</span>`; }
function progressColor(p){ return p>=80?'fill-green':p>=50?'fill-blue':p>=20?'fill-orange':'fill-red'; }
function pbar(p){ return `<div class="ipb"><div class="ipb-bar"><div class="ipb-fill ${progressColor(p)}" style="width:${p}%"></div></div><span class="pct">${p}%</span></div>`; }
function subDot(s){ const m=SUB_MAP[s]||SUB_MAP['not-started']; return `<span class="sdot ${m.dot}" title="${m.label}"></span>`; }
function autoBadge(a){ return a===true?'<span class="ab ab-y">자동</span>':a==='semi'?'<span class="ab ab-s">반자동</span>':'<span class="ab ab-n">수동</span>'; }
function domTag(d){ const c={APD:'tag-apd',PC:'tag-pc',CO:'tag-co',PD:'tag-pd',ITAC:'tag-itac'}; return `<span class="dom-tag ${c[d]||''}">${d}</span>`; }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function calcDomStats(domain){
  const rows = itgcData.filter(r=>r.domain===domain);
  const done = rows.filter(r=>r.status==='completed').length;
  const ip   = rows.filter(r=>r.status==='in-progress'||r.status==='under-review').length;
  const exc  = rows.filter(r=>r.exc).length;
  const avgPct = rows.length ? Math.round(rows.reduce((a,r)=>a+r.pct,0)/rows.length) : 0;
  return { total:rows.length, done, ip, exc, avgPct };
}

function switchTab(id, btn){
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('pane-'+id).classList.add('active');
  if(btn) btn.classList.add('active');
  if(id==='dashboard') renderDashboard();
  if(id==='itgc')      renderITGC();
  if(id==='itac')      renderITAC();
}

// DATA MUTATIONS
// ══════════════════════════════════════════════════
function getDataArr(tbl){ return tbl==='itgc'?itgcData:itacData; }

function setField(tbl, id, field, val){
  const arr = getDataArr(tbl);
  const row = arr.find(r=>r.id===id);
  if(!row) return;
  row[field] = val;
  if(field==='status'){
    // auto-update progress estimate
    const map={'not-started':0,'in-progress':50,'under-review':85,'completed':100,'issue':60};
    row.pct = row.pct || map[val]||0;
  }
  saveState();
}

function setExtra(tbl, id, colName, val){
  const arr = getDataArr(tbl);
  const row = arr.find(r=>r.id===id);
  if(!row) return;
  if(!row.extra) row.extra={};
  row.extra[colName] = val;
  saveState();
}

// ADD / DELETE COLUMN
// ══════════════════════════════════════════════════
function openAddCol(tbl){
  addColTarget = tbl;
  document.getElementById('addcol-name').value='';
  document.getElementById('addcol-type').value='text';
  openModal('mo-addcol');
  setTimeout(()=>document.getElementById('addcol-name').focus(),100);
}

function confirmAddCol(){
  const name = document.getElementById('addcol-name').value.trim();
  const type = document.getElementById('addcol-type').value;
  if(!name){ alert('열 이름을 입력해주세요.'); return; }
  if(addColTarget==='itgc'){
    if(itgcCols.find(c=>c.name===name)){ alert('이미 동일한 이름의 열이 있습니다.'); return; }
    itgcCols.push({name,type});
  } else {
    if(itacCols.find(c=>c.name===name)){ alert('이미 동일한 이름의 열이 있습니다.'); return; }
    itacCols.push({name,type});
  }
  saveState();
  closeModal('mo-addcol');
  if(addColTarget==='itgc') renderITGCTable();
  else renderITACTable();
}

function deleteCol(tbl, idx){
  if(!confirm('이 열을 삭제하시겠습니까? 입력된 데이터도 함께 삭제됩니다.')) return;
  if(tbl==='itgc'){
    const colName = itgcCols[idx].name;
    itgcCols.splice(idx,1);
    itgcData.forEach(r=>{ if(r.extra) delete r.extra[colName]; });
    saveState(); renderITGCTable();
  } else {
    const colName = itacCols[idx].name;
    itacCols.splice(idx,1);
    itacData.forEach(r=>{ if(r.extra) delete r.extra[colName]; });
    saveState(); renderITACTable();
  }
}

      <input class="fi" type="number" id="det-pct" min="0" max="100" value="${row.pct}">
    </div>
    <div class="fg">
      <label class="fl">진행 상태</label>
      <select class="fi" id="det-status">
        ${Object.entries(STATUS_MAP).map(([k,v])=>`<option value="${k}" ${row.status===k?'selected':''}>${v.label}</option>`).join('')}
      </select>
    </div>
    <div class="fg" style="display:flex;align-items:center;gap:10px;">
      <input type="checkbox" id="det-exc" ${row.exc?'checked':''}>
      <label for="det-exc" class="fl" style="margin:0;cursor:pointer;">예외사항 발견 (⚠ 표시)</label>
    </div>
    <div class="fg">
      <label class="fl">비고 / 메모</label>
      <textarea class="fi" id="det-notes" rows="3" placeholder="이슈 내용, 추가 검토 사항 등...">${esc(row.notes)}</textarea>
    </div>
  `;

  document.getElementById('det-body').innerHTML = body;
  openModal('mo-detail');
}

document.getElementById('det-save-btn').addEventListener('click', ()=>{
  if(!detailTarget) return;
  const arr = getDataArr(detailTarget.tbl);
  const row = arr.find(r=>r.id===detailTarget.id);
  if(!row) return;
  row.pct    = parseInt(document.getElementById('det-pct').value)||0;
  row.status = document.getElementById('det-status').value;
  row.exc    = document.getElementById('det-exc').checked;
  row.notes  = document.getElementById('det-notes').value;
  saveState();
  closeModal('mo-detail');
  if(detailTarget.tbl==='itgc') renderITGCTable();
  else renderITACTable();
});

// ══════════════════════════════════════════════════
// MODAL
// ══════════════════════════════════════════════════
function openModal(id){ document.getElementById(id).classList.add('open'); }
function closeModal(id){ document.getElementById(id).classList.remove('open'); }

// Close on overlay click
document.querySelectorAll('.mo').forEach(el=>{
  el.addEventListener('click', e=>{ if(e.target===el) el.classList.remove('open'); });
});

// Enter key in add col input
document.getElementById('addcol-name').addEventListener('keydown', e=>{
  if(e.key==='Enter') confirmAddCol();
});

// ══════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════
function init(){
  // Date
  const now = new Date();
  const days = ['일','월','화','수','목','금','토'];
  document.getElementById('hdr-date').textContent =
    `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')} (${days[now.getDay()]})`;

  loadState();
  renderDashboard();
  renderITGC();
  renderITAC();
}

init();
</script>
</body>
</html>
