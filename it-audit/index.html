<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IT Audit 진행 현황 | 삼일PwC</title>
  <style>
    :root {
      --red:#E31837; --red-dk:#B01229; --red-lt:#FBEAED;
      --white:#FFF; --off:#F7F7F7; --lt:#F0F0F0; --mid:#D0D0D0;
      --gray:#767676; --dark:#2D2D2D; --text:#333;
      --green:#00843D; --green-lt:#E6F4EE;
      --orange:#E65100; --orange-lt:#FFF3E0;
      --blue:#0070C0; --blue-lt:#E3F2FD;
      --purple:#6A1B9A; --purple-lt:#F3E5F5;
      --shadow:0 1px 4px rgba(0,0,0,.1);
      --shadow-md:0 4px 16px rgba(0,0,0,.15);
      --r:3px;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Malgun Gothic','맑은 고딕',sans-serif;background:var(--off);color:var(--text);font-size:13px;line-height:1.5;}

    /* Header */
    .hdr{background:var(--red);color:#fff;padding:0 24px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 2px 6px rgba(0,0,0,.25);}
    .hdr-brand{display:flex;align-items:center;gap:12px;}
    .pwc-logo{font-size:21px;font-weight:800;letter-spacing:-.5px;}
    .hdr-sep{width:1px;height:24px;background:rgba(255,255,255,.35);}
    .hdr-title{font-size:13px;font-weight:400;opacity:.9;}
    .hdr-right{font-size:11px;opacity:.8;text-align:right;line-height:1.4;}

    /* Tab Nav */
    .tab-nav{background:#fff;border-bottom:1px solid var(--mid);padding:0 24px;display:flex;align-items:center;position:sticky;top:54px;z-index:190;}
    .tab-nav button{padding:13px 18px;border:none;background:none;cursor:pointer;font-size:13px;font-weight:500;color:var(--gray);border-bottom:3px solid transparent;transition:all .15s;}
    .tab-nav button:hover{color:var(--red);}
    .tab-nav button.active{color:var(--red);border-bottom-color:var(--red);font-weight:700;}

    /* Layout */
    .main{padding:22px 24px;max-width:1700px;margin:0 auto;}
    .tab-pane{display:none;} .tab-pane.active{display:block;}

    /* Cards */
    .card{background:#fff;border-radius:var(--r);box-shadow:var(--shadow);padding:18px 20px;margin-bottom:18px;}
    .card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid var(--red);}
    .card-hd h3{font-size:14px;font-weight:700;color:var(--dark);}
    .card-actions{display:flex;gap:8px;align-items:center;}

    /* KPI */
    .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:14px;margin-bottom:18px;}
    .kpi{background:#fff;border-radius:var(--r);padding:14px 18px;box-shadow:var(--shadow);border-left:4px solid var(--red);}
    .kpi.green{border-left-color:var(--green);}
    .kpi.blue{border-left-color:var(--blue);}
    .kpi.orange{border-left-color:var(--orange);}
    .kpi-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--gray);margin-bottom:6px;font-weight:600;}
    .kpi-val{font-size:30px;font-weight:800;color:var(--dark);line-height:1;}
    .kpi-sub{font-size:11px;color:var(--gray);margin-top:5px;}

    /* Domain grid */
    .domain-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px;}
    .dom-card{background:#fff;border-radius:var(--r);padding:18px;box-shadow:var(--shadow);}
    .dom-tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;margin-bottom:8px;}
    .tag-apd{background:var(--blue-lt);color:var(--blue);}
    .tag-pc{background:var(--green-lt);color:var(--green);}
    .tag-co{background:var(--orange-lt);color:var(--orange);}
    .tag-pd{background:var(--purple-lt);color:var(--purple);}
    .tag-itac{background:#FFF9C4;color:#F57F17;}
    .dom-name{font-weight:700;font-size:13px;margin-bottom:2px;}
    .dom-sub{font-size:11px;color:var(--gray);margin-bottom:10px;}
    .dom-stat{display:flex;justify-content:space-between;font-size:11px;color:var(--gray);margin-bottom:3px;}

    /* Progress bars */
    .pb{height:6px;background:var(--lt);border-radius:3px;overflow:hidden;}
    .pb-fill{height:100%;border-radius:3px;transition:width .4s ease;}
    .fill-green{background:var(--green);}
    .fill-orange{background:var(--orange);}
    .fill-red{background:var(--red);}
    .fill-blue{background:var(--blue);}

    /* Staff */
    .staff-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px;}
    .staff-card{background:#fff;border-radius:var(--r);padding:16px;box-shadow:var(--shadow);}
    .staff-av{width:38px;height:38px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;margin-bottom:10px;}
    .staff-name{font-weight:700;font-size:14px;}
    .staff-role{font-size:11px;color:var(--gray);margin-bottom:10px;}
    .staff-dom{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px;}
    .staff-tag{padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600;}

    /* Tables */
    .tbl-wrap{overflow-x:auto;}
    table{width:100%;border-collapse:collapse;font-size:12px;min-width:900px;}
    thead th{background:#F5F5F5;padding:9px 11px;text-align:left;font-weight:700;color:var(--dark);border-bottom:2px solid var(--mid);white-space:nowrap;font-size:11px;text-transform:uppercase;letter-spacing:.4px;}
    tbody td{padding:9px 11px;border-bottom:1px solid #F0F0F0;vertical-align:middle;}
    tbody tr.main-row:hover td{background:#FAFAFA;}

    /* Toggle button */
    .tog-btn{background:none;border:1px solid var(--mid);border-radius:3px;padding:2px 7px;cursor:pointer;font-size:11px;color:var(--gray);line-height:1;transition:all .15s;}
    .tog-btn:hover{background:var(--lt);}
    .tog-btn.open{background:var(--red);color:#fff;border-color:var(--red);}

    /* Sub-row */
    .sub-row td{padding:0;border-bottom:2px solid #E8E8E8;}
    .sub-inner{padding:12px 16px 16px 52px;background:#F9F9F9;}
    .sub-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--gray);margin-bottom:12px;display:flex;align-items:center;gap:6px;}
    .extra-item-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
    .extra-name-in{width:155px;border:1px solid var(--mid);padding:5px 8px;border-radius:var(--r);font-size:12px;font-family:inherit;}
    .extra-val-in{flex:1;min-width:180px;border:1px solid var(--mid);padding:5px 8px;border-radius:var(--r);font-size:12px;font-family:inherit;}
    .extra-name-in:focus,.extra-val-in:focus{outline:none;border-color:var(--red);}
    .extra-del-btn{background:none;border:1px solid var(--mid);border-radius:3px;padding:3px 8px;cursor:pointer;color:var(--gray);font-size:12px;transition:all .15s;}
    .extra-del-btn:hover{border-color:var(--red);color:var(--red);}
    .add-item-btn{margin-top:4px;padding:5px 14px;background:none;border:1px dashed var(--red);border-radius:var(--r);color:var(--red);cursor:pointer;font-size:12px;font-weight:600;}
    .add-item-btn:hover{background:var(--red-lt);}
    .extra-empty{font-size:12px;color:var(--gray);font-style:italic;margin-bottom:10px;}

    /* Domain filter tabs */
    .dom-tabs{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center;}
    .dom-tab{padding:5px 14px;border:1px solid var(--mid);background:#fff;border-radius:20px;cursor:pointer;font-size:12px;font-weight:500;color:var(--gray);transition:all .15s;}
    .dom-tab:hover{border-color:var(--red);color:var(--red);}
    .dom-tab.active{background:var(--red);color:#fff;border-color:var(--red);}

    /* Status / badges */
    .sb{display:inline-block;padding:2px 9px;border-radius:10px;font-size:11px;font-weight:600;white-space:nowrap;}
    .sb-ns{background:#EEE;color:#616161;}
    .sb-ip{background:var(--blue-lt);color:var(--blue);}
    .sb-rv{background:var(--orange-lt);color:var(--orange);}
    .sb-ok{background:var(--green-lt);color:var(--green);}
    .sb-ex{background:#FFEBEE;color:#C62828;}
    .sdot{width:9px;height:9px;border-radius:50%;display:inline-block;}
    .sdot-ns{background:#BDBDBD;} .sdot-ip{background:var(--blue);} .sdot-ok{background:var(--green);} .sdot-ex{background:var(--red);}
    .ab{display:inline-block;padding:2px 7px;border-radius:3px;font-size:10px;font-weight:700;}
    .ab-y{background:var(--green-lt);color:var(--green);}
    .ab-n{background:#F5F5F5;color:#757575;}
    .ab-s{background:var(--orange-lt);color:var(--orange);}

    /* Inline progress */
    .ipb{display:flex;align-items:center;gap:7px;}
    .ipb-bar{flex:1;height:5px;background:var(--lt);border-radius:3px;overflow:hidden;min-width:50px;}
    .ipb-fill{height:100%;border-radius:3px;}
    .pct{font-size:11px;font-weight:700;color:var(--gray);min-width:32px;text-align:right;}

    /* Global extra col */
    .gcol-in{width:100%;border:1px solid #E8E8E8;padding:4px 7px;border-radius:3px;font-size:12px;}
    .gcol-in:focus{outline:none;border-color:var(--red);}
    .col-del{background:none;border:none;color:#CCC;cursor:pointer;padding:0 3px;font-size:12px;vertical-align:middle;}
    .col-del:hover{color:var(--red);}

    /* Status select */
    .st-sel{border:1px solid var(--mid);border-radius:10px;padding:2px 6px;font-size:11px;font-weight:600;background:#fff;cursor:pointer;}

    /* Buttons */
    .btn{padding:6px 14px;border-radius:var(--r);border:none;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s;}
    .btn-r{background:var(--red);color:#fff;} .btn-r:hover{background:var(--red-dk);}
    .btn-o{background:#fff;color:var(--red);border:1px solid var(--red);} .btn-o:hover{background:var(--red);color:#fff;}
    .btn-g{background:#fff;color:var(--gray);border:1px solid var(--mid);} .btn-g:hover{background:var(--lt);}
    .btn-sm{padding:4px 10px;font-size:11px;}

    /* Modal */
    .mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center;}
    .mo.open{display:flex;}
    .mo-box{background:#fff;border-radius:var(--r);padding:24px;width:90%;max-width:520px;box-shadow:var(--shadow-md);max-height:90vh;overflow-y:auto;}
    .mo-box.wide{max-width:660px;}
    .mo-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;padding-bottom:10px;border-bottom:2px solid var(--red);}
    .mo-hd h3{font-size:15px;font-weight:700;}
    .mo-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--gray);}
    .mo-ft{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid var(--lt);}

    /* Form */
    .fg{margin-bottom:14px;}
    .fl{display:block;font-size:12px;font-weight:600;color:var(--dark);margin-bottom:5px;}
    .fi{width:100%;padding:7px 11px;border:1px solid var(--mid);border-radius:var(--r);font-size:13px;transition:border-color .15s;font-family:inherit;}
    .fi:focus{outline:none;border-color:var(--red);}
    select.fi{background:#fff;cursor:pointer;}
    textarea.fi{resize:vertical;min-height:70px;}

    /* Detail rows */
    .dl{display:flex;gap:8px;margin-bottom:8px;}
    .dt{font-size:12px;color:var(--gray);font-weight:500;min-width:130px;flex-shrink:0;}
    .dd{font-size:12px;}
    .sec-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--gray);margin:14px 0 8px;}

    /* Legend */
    .legend{display:flex;gap:14px;flex-wrap:wrap;}
    .leg-i{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--gray);}

    .cnt{font-size:12px;color:var(--gray);}
    .exc{color:var(--red);font-weight:700;}
    .no-exc{color:#CCC;}
    .smry{width:100%;border-collapse:collapse;margin-top:6px;font-size:12px;}
    .smry td{padding:5px 8px;border:1px solid var(--lt);}
    .smry tr:nth-child(even) td{background:var(--off);}

    @media(max-width:900px){
      .domain-grid{grid-template-columns:repeat(2,1fr);}
      .kpi-grid{grid-template-columns:repeat(2,1fr);}
      .main{padding:12px 14px;}
    }
  </style>
</head>
<body>

<!-- Header -->
<header class="hdr">
  <div class="hdr-brand">
    <div class="pwc-logo">PwC</div>
    <div class="hdr-sep"></div>
    <div class="hdr-title">IT Audit 진행 현황 관리</div>
  </div>
  <div class="hdr-right">
    <div>삼일PwC · IT Audit Team</div>
    <div id="hdr-date"></div>
  </div>
</header>

<!-- Tab Nav -->
<nav class="tab-nav">
  <button class="active" onclick="switchTab('dashboard',this)">📊 대시보드</button>
  <button onclick="switchTab('itgc',this)">🔒 ITGC</button>
  <button onclick="switchTab('itac',this)">⚙️ ITAC</button>
</nav>

<main class="main">

  <!-- ══ DASHBOARD ══ -->
  <div id="pane-dashboard" class="tab-pane active">
    <div class="kpi-grid" id="kpi-area"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px;">
      <div class="card">
        <div class="card-hd"><h3>ITGC 도메인별 완료율</h3></div>
        <div id="domain-prog"></div>
      </div>
      <div class="card">
        <div class="card-hd"><h3>ITAC 프로세스별 완료율</h3></div>
        <div id="itac-prog"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-hd"><h3>담당자별 현황</h3></div>
      <div class="staff-grid" id="staff-area"></div>
    </div>
    <div class="card" style="padding:14px 20px;">
      <div class="legend">
        <div class="leg-i"><span class="sb sb-ns">미착수</span> 시작 전</div>
        <div class="leg-i"><span class="sb sb-ip">진행중</span> 수행 중</div>
        <div class="leg-i"><span class="sb sb-rv">검토중</span> Manager 검토</div>
        <div class="leg-i"><span class="sb sb-ok">완료</span> Sign-off 완료</div>
        <div class="leg-i"><span class="sb sb-ex">이슈있음</span> 예외사항</div>
        <div class="leg-i" style="margin-left:auto;font-size:11px;color:var(--gray);">※ 진행률 = 완료 통제 수 / 전체 통제 수</div>
      </div>
    </div>
  </div>

  <!-- ══ ITGC ══ -->
  <div id="pane-itgc" class="tab-pane">
    <div class="domain-grid" id="dom-summary"></div>
    <div class="card">
      <div class="card-hd">
        <h3>ITGC 통제 현황</h3>
        <div class="card-actions">
          <span id="itgc-cnt" class="cnt"></span>
          <button class="btn btn-o btn-sm" onclick="openAddCol('itgc')">＋ 공통 열 추가</button>
        </div>
      </div>
      <div class="dom-tabs" id="dom-filter">
        <button class="dom-tab active" onclick="filterDomain('ALL',this)">전체</button>
        <button class="dom-tab" onclick="filterDomain('APD',this)">APD · 변경관리</button>
        <button class="dom-tab" onclick="filterDomain('PC',this)">PC · 접근통제</button>
        <button class="dom-tab" onclick="filterDomain('CO',this)">CO · 운영통제</button>
        <button class="dom-tab" onclick="filterDomain('PD',this)">PD · 문제관리</button>
      </div>
      <div class="tbl-wrap">
        <table id="itgc-tbl">
          <thead id="itgc-thead"></thead>
          <tbody id="itgc-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- ══ ITAC ══ -->
  <div id="pane-itac" class="tab-pane">
    <div class="card">
      <div class="card-hd">
        <h3>ITAC 응용 통제 현황</h3>
        <div class="card-actions">
          <span id="itac-cnt" class="cnt"></span>
          <button class="btn btn-o btn-sm" onclick="openAddCol('itac')">＋ 공통 열 추가</button>
        </div>
      </div>
      <div class="dom-tabs" id="itac-proc-filter">
        <button class="dom-tab active" onclick="filterProc('ALL',this)">전체</button>
        <button class="dom-tab" onclick="filterProc('수익',this)">수익</button>
        <button class="dom-tab" onclick="filterProc('구매',this)">구매/지출</button>
        <button class="dom-tab" onclick="filterProc('급여',this)">급여</button>
        <button class="dom-tab" onclick="filterProc('재고',this)">재고/자산</button>
        <button class="dom-tab" onclick="filterProc('재무',this)">재무마감</button>
      </div>
      <div class="tbl-wrap">
        <table id="itac-tbl">
          <thead id="itac-thead"></thead>
          <tbody id="itac-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

</main>

<!-- Modal: Add Global Column -->
<div class="mo" id="mo-addcol">
  <div class="mo-box">
    <div class="mo-hd">
      <h3>공통 열 추가 <span style="font-size:12px;font-weight:400;color:var(--gray)">— 전체 통제에 동일하게 적용</span></h3>
      <button class="mo-close" onclick="closeModal('mo-addcol')">✕</button>
    </div>
    <div class="fg">
      <label class="fl">열 이름</label>
      <input class="fi" id="addcol-name" type="text" placeholder="예: 추가증빙 요청, 전문가 의견 등">
    </div>
    <div class="fg">
      <label class="fl">입력 형식</label>
      <select class="fi" id="addcol-type">
        <option value="text">텍스트 자유 입력</option>
        <option value="status">상태 선택 (Y / N / N/A)</option>
        <option value="date">날짜</option>
      </select>
    </div>
    <p style="font-size:11px;color:var(--gray);margin-top:-6px;">공통 열은 진행상태 앞에 삽입됩니다. 통제별 개별 항목은 각 행의 ▶ 버튼을 이용하세요.</p>
    <div class="mo-ft">
      <button class="btn btn-g" onclick="closeModal('mo-addcol')">취소</button>
      <button class="btn btn-r" onclick="confirmAddCol()">추가</button>
    </div>
  </div>
</div>

<!-- Modal: Control Detail -->
<div class="mo" id="mo-detail">
  <div class="mo-box wide">
    <div class="mo-hd">
      <h3 id="det-title">통제 상세</h3>
      <button class="mo-close" onclick="closeModal('mo-detail')">✕</button>
    </div>
    <div id="det-body"></div>
    <div class="mo-ft">
      <button class="btn btn-g" onclick="closeModal('mo-detail')">닫기</button>
      <button class="btn btn-r" id="det-save-btn">저장</button>
    </div>
  </div>
</div>

<script>
'use strict';

// ══════════════════════════════════════════════
// DEFAULT DATA
// ══════════════════════════════════════════════
const DEFAULT_ITGC = [
  {id:'APD-01',domain:'APD',name:'변경요청 및 승인',         obj:'모든 IT 변경이 공식 절차에 따라 요청·승인됨',           owner:'김민준',popType:'거래 기반',popDesc:'연간 변경 티켓 수',        isAuto:false,popSize:'156건', sample:25,  status:'in-progress', ev:'completed',   test:'in-progress', rev:'not-started',pct:65, exc:false,notes:''},

function dc(o){ return JSON.parse(JSON.stringify(o)); }

function migrateRow(r) {
  // migrate old r.extra (object) → r.extraGlobal + r.extraItems
  if (!r.extraGlobal) {
    r.extraGlobal = (r.extra && !Array.isArray(r.extra)) ? r.extra : {};
  }
  if (!Array.isArray(r.extraItems)) r.extraItems = [];
  delete r.extra;
}

function loadState() {
  try {
    itgcData = JSON.parse(localStorage.getItem('itgc_data2')) || dc(DEFAULT_ITGC);
    itacData = JSON.parse(localStorage.getItem('itac_data2')) || dc(DEFAULT_ITAC);
    itgcCols = JSON.parse(localStorage.getItem('itgc_cols2')) || [];
    itacCols = JSON.parse(localStorage.getItem('itac_cols2')) || [];
    itgcData.forEach(migrateRow);
    itacData.forEach(migrateRow);
  } catch(e) {
    itgcData = dc(DEFAULT_ITGC); itacData = dc(DEFAULT_ITAC);
    itgcCols = []; itacCols = [];
    itgcData.forEach(migrateRow); itacData.forEach(migrateRow);
  }
}

function save() {
  localStorage.setItem('itgc_data2', JSON.stringify(itgcData));
  localStorage.setItem('itac_data2', JSON.stringify(itacData));
  localStorage.setItem('itgc_cols2', JSON.stringify(itgcCols));
  localStorage.setItem('itac_cols2', JSON.stringify(itacCols));
}

// ══ Progress: completed / total × 100 ══
function domStats(domain) {
  const rows = itgcData.filter(r => r.domain === domain);
  const done = rows.filter(r => r.status === 'completed').length;
  const ip   = rows.filter(r => r.status === 'in-progress' || r.status === 'under-review').length;
  const exc  = rows.filter(r => r.exc).length;
  const pct  = rows.length ? Math.round(done / rows.length * 100) : 0;
  return {total: rows.length, done, ip, exc, pct};
}

function staffStats(name) {
  const all = [...itgcData.filter(r=>r.owner===name), ...itacData.filter(r=>r.owner===name)];
  const done = all.filter(r=>r.status==='completed').length;
  const exc  = all.filter(r=>r.exc).length;
  const pct  = all.length ? Math.round(done / all.length * 100) : 0;
  return {total: all.length, done, exc, pct};
}

function switchTab(id, btn) {
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('pane-'+id).classList.add('active');
  if(btn) btn.classList.add('active');
  if(id==='dashboard') renderDashboard();
  if(id==='itgc')      { renderDomSummary(); renderITGCTable(); }
  if(id==='itac')      renderITACTable();
}

// ══════════════════════════════════════════════
// SUB-ROW (per-row extra items)
// ══════════════════════════════════════════════
function buildSubInner(tbl, row) {
  const items = row.extraItems || [];
  const rowInfo = tbl === 'itgc'
    ? `${row.domain} | ${esc(row.name)} | 담당: ${esc(row.owner)}`
    : `${row.proc} | ${esc(row.name)} | 담당: ${esc(row.owner)}`;

  return `<div class="sub-inner">
    <div class="sub-title">
      📋 추가 검토 항목
      <span style="font-weight:400;font-size:11px;color:var(--gray);text-transform:none;">${rowInfo}</span>
    </div>
    <div id="ei-${row.id}">${buildItemsList(tbl, row.id, items)}</div>
    <button class="add-item-btn" onclick="addItem('${tbl}','${row.id}')">＋ 항목 추가</button>
  </div>`;
}

function buildItemsList(tbl, id, items) {
  if (!items.length) {
    return `<div class="extra-empty">추가 검토 항목이 없습니다. 아래 버튼으로 통제 특성에 맞는 항목을 추가하세요.</div>`;
  }
  return items.map((item, idx) => `
    <div class="extra-item-row">
      <input class="extra-name-in" type="text" placeholder="항목명 (예: 추가증빙 요청)" value="${esc(item.name)}"
        onchange="updateItem('${tbl}','${id}',${idx},'name',this.value)">
      <span style="color:var(--mid);font-size:16px;">:</span>
      <input class="extra-val-in" type="text" placeholder="내용 입력..." value="${esc(item.value)}"
        onchange="updateItem('${tbl}','${id}',${idx},'value',this.value)">
      <button class="extra-del-btn" onclick="removeItem('${tbl}','${id}',${idx})">✕</button>
    </div>`).join('');
}

function toggleSub(tbl, id) {
  const sub = document.getElementById('sub-'+id);
  const btn = document.getElementById('tog-'+id);
  if (!sub) return;
  const open = sub.style.display !== 'none';
  if (open) {
    sub.style.display = 'none';
    btn.textContent = '▶'; btn.classList.remove('open');
    openSubRows.delete(id);
  } else {
    // Rebuild sub inner to ensure fresh state
    const arr = tbl === 'itgc' ? itgcData : itacData;
    const row = arr.find(r=>r.id===id);
    if (row) sub.querySelector('td').innerHTML = buildSubInner(tbl, row);
    sub.style.display = 'table-row';
    btn.textContent = '▼'; btn.classList.add('open');
    openSubRows.add(id);
  }
}

function addItem(tbl, id) {
  const arr = tbl === 'itgc' ? itgcData : itacData;
  const row = arr.find(r=>r.id===id);
  if (!row) return;
  if (!Array.isArray(row.extraItems)) row.extraItems = [];
  row.extraItems.push({name:'', value:''});
  save();
  refreshItems(tbl, row);
}

function removeItem(tbl, id, idx) {
  const arr = tbl === 'itgc' ? itgcData : itacData;
  const row = arr.find(r=>r.id===id);
  if (!row || !row.extraItems) return;
  row.extraItems.splice(idx, 1);
  save();
  refreshItems(tbl, row);
}

function updateItem(tbl, id, idx, field, val) {
  const arr = tbl === 'itgc' ? itgcData : itacData;
  const row = arr.find(r=>r.id===id);
  if (!row || !row.extraItems || !row.extraItems[idx]) return;
  row.extraItems[idx][field] = val;
  save();
}

function refreshItems(tbl, row) {
  const el = document.getElementById('ei-'+row.id);
  if (el) el.innerHTML = buildItemsList(tbl, row.id, row.extraItems || []);
}

// ══════════════════════════════════════════════
// DATA MUTATIONS
// ══════════════════════════════════════════════
function getArr(tbl) { return tbl === 'itgc' ? itgcData : itacData; }

function setField(tbl, id, field, val) {
  const row = getArr(tbl).find(r=>r.id===id);
  if (!row) return;
  row[field] = val;
  save();
}

function setGlobal(tbl, id, col, val) {
  const row = getArr(tbl).find(r=>r.id===id);
  if (!row) return;
  if (!row.extraGlobal) row.extraGlobal = {};
  row.extraGlobal[col] = val;
  save();
}

// ══════════════════════════════════════════════
// GLOBAL COLUMN ADD/DELETE
// ══════════════════════════════════════════════
function openAddCol(tbl) {
  addColTarget = tbl;
  document.getElementById('addcol-name').value = '';
  document.getElementById('addcol-type').value = 'text';
  openModal('mo-addcol');
  setTimeout(()=>document.getElementById('addcol-name').focus(), 80);
}

function confirmAddCol() {
  const name = document.getElementById('addcol-name').value.trim();
  const type = document.getElementById('addcol-type').value;
  if (!name) { alert('열 이름을 입력해주세요.'); return; }
  const cols = addColTarget === 'itgc' ? itgcCols : itacCols;
  if (cols.find(c=>c.name===name)) { alert('동일한 이름의 열이 이미 있습니다.'); return; }
  cols.push({name, type});
  save();
  closeModal('mo-addcol');
  if (addColTarget === 'itgc') renderITGCTable();
  else renderITACTable();
}

function deleteCol(tbl, idx) {
  if (!confirm('이 공통 열을 삭제할까요? 입력된 데이터도 함께 삭제됩니다.')) return;
  const cols = tbl === 'itgc' ? itgcCols : itacCols;
  const name = cols[idx].name;
  cols.splice(idx, 1);
  getArr(tbl).forEach(r=>{ if(r.extraGlobal) delete r.extraGlobal[name]; });
  save();
  if (tbl === 'itgc') renderITGCTable();
  else renderITACTable();
}

// ══════════════════════════════════════════════
// DETAIL MODAL
// ══════════════════════════════════════════════
function openDetail(tbl, id) {
  const row = getArr(tbl).find(r=>r.id===id);
  if (!row) return;
  detailTarget = {tbl, id};
  document.getElementById('det-title').textContent = `${row.id} · ${row.name}`;

  const isG = tbl === 'itgc';
  document.getElementById('det-body').innerHTML = `
    <div class="sec-lbl">기본 정보</div>
    <div class="dl"><div class="dt">통제 ID</div><div class="dd"><strong>${row.id}</strong></div></div>
    ${isG?`<div class="dl"><div class="dt">도메인</div><div class="dd">${domTag(row.domain)}</div></div>`:''}
    ${!isG?`<div class="dl"><div class="dt">프로세스</div><div class="dd">${esc(row.proc)}</div></div><div class="dl"><div class="dt">시스템</div><div class="dd">${esc(row.app)}</div></div>`:''}
    <div class="dl"><div class="dt">통제명</div><div class="dd"><strong>${esc(row.name)}</strong></div></div>
    ${isG?`<div class="dl"><div class="dt">통제 목적</div><div class="dd">${esc(row.obj)}</div></div>`:''}
    ${!isG?`<div class="dl"><div class="dt">통제 유형</div><div class="dd">${esc(row.type)}</div></div>`:''}
    <div class="dl"><div class="dt">자동통제 여부</div><div class="dd">${autoBadge(row.isAuto)}</div></div>
    <div class="dl"><div class="dt">담당자</div><div class="dd">${esc(row.owner)}</div></div>
    ${isG?`
    <div class="sec-lbl">모집단 정보</div>
    <div class="dl"><div class="dt">모집단 성격</div><div class="dd">${esc(row.popType)}</div></div>
    <div class="dl"><div class="dt">모집단 설명</div><div class="dd">${esc(row.popDesc)}</div></div>
    <div class="dl"><div class="dt">모집단 규모</div><div class="dd">${esc(row.popSize)}</div></div>
    <div class="dl"><div class="dt">샘플 수</div><div class="dd">${row.sample!=null?row.sample+'건':'N/A'}</div></div>`:''}
    <div class="sec-lbl">진행 현황</div>
    <table class="smry">
      <tr>
        <td style="font-weight:600;width:90px">증빙 수집</td><td>${subDot(row.ev)} ${SUB_MAP[row.ev]?.label}</td>
        <td style="font-weight:600;width:90px">테스트 수행</td><td>${subDot(row.test)} ${SUB_MAP[row.test]?.label}</td>
        <td style="font-weight:600;width:70px">검토</td><td>${subDot(row.rev)} ${SUB_MAP[row.rev]?.label}</td>
      </tr>
    </table>
    <div style="margin-top:10px;">${pbar(row.pct)}</div>
    <div class="sec-lbl">상태 수정</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <div class="fg" style="margin:0">
        <label class="fl">진행 상태</label>
        <select class="fi" id="det-status">${stOpts(row.status)}</select>
      </div>
      <div class="fg" style="margin:0">
        <label class="fl">진행률 % (개별)</label>
        <input class="fi" type="number" id="det-pct" min="0" max="100" value="${row.pct}">
      </div>
    </div>
    <div class="fg" style="margin-top:12px;display:flex;align-items:center;gap:8px;">
      <input type="checkbox" id="det-exc" ${row.exc?'checked':''}>
      <label for="det-exc" style="font-size:12px;cursor:pointer;">예외사항 발견 (⚠ 표시)</label>
    </div>
    <div class="fg">
      <label class="fl">비고</label>
      <textarea class="fi" id="det-notes" rows="2" placeholder="이슈 내용, 추가 검토 사항...">${esc(row.notes)}</textarea>
    </div>`;

  openModal('mo-detail');
}

document.getElementById('det-save-btn').addEventListener('click', () => {
  if (!detailTarget) return;
  const row = getArr(detailTarget.tbl).find(r=>r.id===detailTarget.id);
  if (!row) return;
  row.status = document.getElementById('det-status').value;
  row.pct    = Math.min(100, Math.max(0, parseInt(document.getElementById('det-pct').value)||0));
  row.exc    = document.getElementById('det-exc').checked;
  row.notes  = document.getElementById('det-notes').value;
  save();
  closeModal('mo-detail');
  if (detailTarget.tbl === 'itgc') renderITGCTable();
  else renderITACTable();
});

// ══════════════════════════════════════════════
// MODAL
// ══════════════════════════════════════════════
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('.mo').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
});
document.getElementById('addcol-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') confirmAddCol();
});

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
function init() {
  const now = new Date();
  const days = ['일','월','화','수','목','금','토'];
  document.getElementById('hdr-date').textContent =
    `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')} (${days[now.getDay()]})`;
  loadState();
  renderDashboard();
  renderDomSummary();
  renderITGCTable();
  renderITACTable();
}

init();
</script>
</body>
</html>
